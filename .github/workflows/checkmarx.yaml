name: Checkmarx One Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkmarx-one:
    name: Run Checkmarx One Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkmarx One scan
        uses: Checkmarx/ast-github-action@v1.7
        with:
          base_url: https://ast.checkmarx.net
          cx_tenant: ${{ secrets.CX_TENANT }}
          cx_client_id: ${{ secrets.CX_CLIENT_ID }}
          cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
          cx_project_name: juice-shop
          cx_branch_name: main
          cx_scan_types: sast,sca,iac
          break_build: false
          include_git_history: true
